@if (cards() && cards().length) {
  <div class="flash-card-container">

    <div class="flash-card-view">
      @for (card of cards(); track $index; let i = $index) {
        <q-flip-card [active]="i === state().index" [item]="card" [(isFlipped)]="currentSide" />
      }
    </div>

    <div class="flash-card-controls">
      <div class="c-center">
        <button class="Btn ME-3" [disabled]="state().index === 0" (click)="prev()" title="Previous">
          <i class="fas fa-arrow-left"></i>
        </button>

        <span>{{ state().index + 1 }} / {{ cards().length }}</span>

        <button class="Btn MS-3" [disabled]="state().index === cards().length - 1" (click)="next()" title="Next">
          <i class="fas fa-arrow-right"></i>
        </button>
      </div>

      <div class="c-right">
        <!-- keyboard shortcuts hint -->
        <div class="dropUp">
          <span class="dropUp-btn"><i class="fas fa-keyboard"></i></span>
          <div class="dropUp-content">
            <ul>
              <li>Previous <span class="Float-end Border PY-1 PX-3"><i class="fas fa-arrow-left"></i></span></li>
              <li>Next <span class="Float-end Border PY-1 PX-3"><i class="fas fa-arrow-right"></i></span></li>
              <li>Flip <span class="Float-end Border PY-1 PX-3">Space</span></li>
            </ul>
          </div>
        </div>

        <button class="Btn"><i class="fas fa-expand"></i></button>
      </div>
    </div>
  </div>
}
