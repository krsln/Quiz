<div class="flash-card">
  <div class="flash-card-inner" [class.flipped]="isFlipped()" (click)="flip()">
    <!-- Front -->
    <div class="flash-card-face front">
      <div class="actions-top">
        <button (click)="speak('front'); $event.stopImmediatePropagation()" title="Speak front">
          🔊
        </button>
        <button (click)="onFavorite.emit(); $event.stopImmediatePropagation()" [class.fav]="card().isFavorite">
          ⭐
        </button>
        <button (click)="onEdit.emit(); $event.stopImmediatePropagation()">✏️</button>
      </div>
      <div class="content">
        <p>{{ card().front }}</p>
      </div>
    </div>

    <!-- Back -->
    <div class="flash-card-face back">
      <div class="actions-top">
        <button (click)="speak('back'); $event.stopImmediatePropagation()">🔊</button>
        <button (click)="onFavorite.emit(); $event.stopImmediatePropagation()">⭐</button>
        <button (click)="onEdit.emit(); $event.stopImmediatePropagation()">✏️</button>
      </div>
      <div class="content">
        <p>{{ card().back }}</p>
      </div>
    </div>
  </div>
</div>
