@if (active()) {
  <div class="flip-card"
       animate.enter="'scale-in'" animate.leave="'scale-out'"
       [class.active]="active()">

    <!--
      flipped class is applied based on internal state
      We derive current side from flipped() signal
    -->
    <div class="flip-card-body" [class.flipped]="isFlipped() === 'front'" (click)="flipCard()">
      <!-- Front -->
      <div class="card-side card-side-front">
        <div class="content-top">
          <button class="Btn Btn-sm Float-end" (click)="speak(false); $event.stopPropagation()">
            <i class="fas fa-volume-up"></i>
          </button>
          <button class="Btn Btn-sm Float-end" (click)="toggleFavorite(); $event.stopPropagation()">
            <i class="fas fa-star"></i>
          </button>
          <button class="Btn Btn-sm Float-end" (click)="edit(); $event.stopPropagation()">
            <i class="fas fa-pen"></i>
          </button>
        </div>

        <div class="content">
          <p>{{ item().front }}</p>
        </div>
      </div>

      <!-- Back -->
      <div class="card-side card-side-back">
        <div class="content-top">
          <button class="Btn Btn-sm Float-end" (click)="speak(true); $event.stopPropagation()">
            <i class="fas fa-volume-up"></i>
          </button>
          <button class="Btn Btn-sm Float-end" (click)="toggleFavorite(); $event.stopPropagation()">
            <i class="fas fa-star"></i>
          </button>
          <button class="Btn Btn-sm Float-end" (click)="edit(); $event.stopPropagation()">
            <i class="fas fa-pen"></i>
          </button>
        </div>

        <div class="content">
          <p>{{ item().back }}</p>
        </div>
      </div>

    </div>
  </div>
}
